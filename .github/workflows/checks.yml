name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: Allow write access to checks to allow the action to annotate code in the PR.
  # checks: write

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          # NOTE: Keep this in sync with the version from go.mod
          go-version: "1.26.4"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # NOTE: Keep this in sync with the version in the Makefile `lint` target.
          # v2.12.2 is built with go1.26, so it can lint this go 1.26.4 module
          # (older releases built with go1.25 fail the Go-version compatibility check).
          version: v2.12.2
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4

      # Run tests
      - name: Test
        run: make test