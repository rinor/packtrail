version: "1.0"
name: research-pipeline

# A fan-out research pipeline (spec §4.1): triage, three parallel research
# branches joined with an "all" policy, a risk-based choice, synthesis, then a
# human approval signal that falls back to escalation on timeout.
nodes:
  - id: triage
    type: task
    subject: "tasks.triage.{execution_id}"
    timeout: 30s
    retry:
      max_attempts: 3
      backoff: exponential

  - id: fanout-research
    type: fanout
    branches: [tech-research, market-research, legal-research]

  - id: tech-research
    type: task
    subject: "tasks.tech-research.{execution_id}"

  - id: market-research
    type: task
    subject: "tasks.market-research.{execution_id}"

  - id: legal-research
    type: task
    subject: "tasks.legal-research.{execution_id}"

  - id: join-research
    type: fanin
    wait_for: [tech-research, market-research, legal-research]
    join_policy: all          # all | any | quorum:N

  - id: route
    type: choice
    rules:
      - when: "payload.risk_score > 80"
        to: escalation
      - default: true
        to: synthesis

  - id: synthesis
    type: task
    subject: "tasks.synthesis.{execution_id}"

  - id: wait-approval
    type: signal
    signal_name: approval
    timeout: 24h
    on_timeout: escalation

  - id: escalation
    type: task
    subject: "tasks.escalation.{execution_id}"

edges:
  - {from: triage, to: fanout-research}
  - {from: fanout-research, to: join-research}
  - {from: join-research, to: route}
  - {from: synthesis, to: wait-approval}
