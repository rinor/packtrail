version: "1.0"
name: agent-pipeline

# An ecosystem-agnostic flow: task nodes select a pluggable invoker by kind
# (here a hypothetical "agent" invoker an embedding app registers via
# packtrail.WithInvoker("agent", ...)) and name their target — an agent name rather
# than a NATS subject. This demonstrates how any agent framework can drive packtrail's
# durable engine, adding conditional routing (choice) and durable signals while
# inheriting packtrail's crash durability and idempotent retries.
nodes:
  - id: triage
    type: task
    invoker: agent
    target: triage-agent
    timeout: 2m
    retry:
      max_attempts: 3
      backoff: exponential

  - id: route
    type: choice
    rules:
      - when: 'payload.category == "billing"'
        to: billing-agent
      - default: true
        to: general-agent

  - id: billing-agent
    type: task
    invoker: agent
    target: billing-agent

  - id: general-agent
    type: task
    invoker: agent
    target: general-agent

  # A built-in nats-task node can coexist with custom invoker nodes in the same flow.
  - id: notify
    type: task
    subject: "tasks.notify.{execution_id}"

edges:
  - {from: triage, to: route}
  - {from: billing-agent, to: notify}
  - {from: general-agent, to: notify}
